<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | SkyCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-custom-light font-display">
    <header class="header-container">
      <div class="logo-section">
        <div class="logo-cloud-bg">
          <span class="material-symbols-outlined logo-cloud-icon">cloud</span>
        </div>
        <span class="logo-text">SkyCast</span>
      </div>
      <div class="nav-section">
        <a class="support-link" href="#">Support</a>
        <button class="btn-join">Join Now</button>
      </div>
    </header>

    <main class="main-content">
      <div class="bg-decorative"></div>

      <div class="login-card">
        <div class="card-hero-image"></div>

        <div class="card-body">
          <div class="card-header-text">
            <h1>Welcome back to SkyCast</h1>
            <p>
              Sign in to access your personalized sky reports, air quality
              alerts, and detailed weather history across all your devices.
            </p>
          </div>

          <div class="auth-methods">
            <button class="btn-google" onclick="loginWithGoogle()">
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4"
                />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05"
                />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335"
                />
              </svg>
              <span>Sign in with Google</span>
            </button>

            <div class="divider">
              <span class="divider-text">Or email</span>
            </div>

            <div class="email-login">
              <label>Email Address</label>
              <input placeholder="name@example.com" type="email" />
              <button class="btn-email" onclick="loginWithEmail()">Continue with Email</button>
            </div>
          </div>

        
        </div>

        <footer class="card-footer">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
        </footer>
      </div>
    </main>

    <footer class="page-footer">
      <p>© 2024 SkyCast. All data updated in real-time.</p>
      <div class="footer-icons">
        <span class="material-symbols-outlined">cloud</span>
        <span class="material-symbols-outlined">air</span>
        <span class="material-symbols-outlined">thermostat</span>
      </div>
    </footer>
    
    <script type="module">
  // ===== IMPORT =====
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  // ===== CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyDwsrMQn_mbMIL_ZoNpiJcWu7SccSVSfk0",
    authDomain: "skycast-5b2c7.firebaseapp.com",
    projectId: "skycast-5b2c7",
    storageBucket: "skycast-5b2c7.firebasestorage.app",
    messagingSenderId: "226194876823",
    appId: "1:226194876823:web:ce019b2611283d9b727cd2",
    measurementId: "G-XE2XP41DMM"
  };

  // ===== INIT =====
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();


  // ===== LOGIN GOOGLE =====
  window.loginWithGoogle = function () {
    signInWithPopup(auth, provider)
      .then((result) => {
        const user = result.user;

        localStorage.setItem("user", JSON.stringify({
          name: user.displayName,
          email: user.email,
          avatar: user.photoURL
        }));

        // Move to dashboard
        window.location.href = "../Dashboard/frontend/dashboard.html";
      })
      .catch((error) => {
        alert("Login failed: " + error.message);
      });
  };


  // ===== LOGIN EMAIL (fake) =====
  window.loginWithEmail = function () {
    const emailInput = document.querySelector('input[type="email"]');
    const email = emailInput.value;

    if (!email) {
      alert("Nhập email đi bro");
      return;
    }

    localStorage.setItem("user", JSON.stringify({
      name: email.split("@")[0],
      email: email
    }));

    window.location.href = "dashboard.html";
  };


  // ===== CHECK LOGIN =====
  window.checkLogin = function () {
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      }
    });
  };


  // ===== LOGOUT =====
  window.logout = function () {
    signOut(auth).then(() => {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    });
  };

</script>

  </body>

</html>
