<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyCast - Đăng ký tài khoản</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="logo-container">
        <img src="logo.image.jpg" alt="SkyCast Logo" class="main-logo" />
        <span class="logo-text">SkyCast</span>
      </div>
    </header>

    <main class="registration-canvas">
      <div class="card">
        <div class="card-header">
          <h1>Join Skycast</h1>
          <p>Start breathing easier with precise air quality data.</p>
        </div>

        <form class="signup-form" id="signupForm">
          <div class="input-group">
            <label>FULL NAME</label>
            <div class="input-wrapper">
              <svg
                class="field-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <input type="text" id="fullname" placeholder="Lilwhutun" />
            </div>
          </div>

          <div class="input-group">
            <label>EMAIL ADDRESS</label>
            <div class="input-wrapper">
              <svg
                class="field-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                ></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              <input type="email" id="email" placeholder="name@example.com" />
            </div>
          </div>

          <div class="input-group">
            <label>PASSWORD</label>
            <div class="input-wrapper">
              <svg
                class="field-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input type="password" id="password" placeholder="••••••••" />
            </div>
          </div>

          <div class="input-group">
            <label>CONFIRM PASSWORD</label>
            <div class="input-wrapper">
              <svg
                class="field-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
              <input type="password" id="confirmPassword" placeholder="••••••••" />
            </div>
          </div>

          <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="divider">
          <span>OR SIGN UP WITH</span>
        </div>

        <button class="btn-google">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt="Google"
          />
          Continue with Google
        </button>

        <div class="card-footer">
          Already have an account? <a href="../Sign-in/index.html">Log in</a>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-brand">
          <span class="footer-logo">SkyCast</span>
          <p>© 2026 SKYCAST. BREATHE EASY.</p>
        </div>
        <div class="footer-links">
          <a href="#">PRIVACY POLICY</a>
          <a href="#">TERMS OF SERVICE</a>
          <a href="#">HELP CENTER</a>
        </div>
      </div>
    </footer>

    <script type="module" src="script.js"></script>
  </body>
</html>
